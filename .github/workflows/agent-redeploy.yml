name: Agent Redeploy

# Closes the self-improving loop: when the Tier-2 specialist agent's instructions
# (or code) land on main, rebuild the container and update the Foundry hosted
# agent so the improvement goes live. Then the evaluation can re-run to confirm
# the score recovered.
#
# Requires Azure OIDC secrets (AZURE_CLIENT_ID, AZURE_TENANT_ID,
# AZURE_SUBSCRIPTION_ID) and azd env values. Without them the job no-ops with a
# clear message, so the repo stays green.

on:
  push:
    branches: [main]
    paths:
      - "agent/instructions/**"
      - "agent/**.py"
      - "agent/agent.yaml"
      - "agent/requirements.txt"
      - "agent/Dockerfile"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: agent-redeploy
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Azure configuration
        id: cfg
        run: |
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Azure OIDC secrets not set — skipping redeploy. Add AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID to enable."
          fi

      - name: Install azd
        if: steps.cfg.outputs.configured == 'true'
        uses: Azure/setup-azd@v2

      - name: Azure login (OIDC)
        if: steps.cfg.outputs.configured == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Redeploy supplements specialist agents
        if: steps.cfg.outputs.configured == 'true'
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
          AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ vars.AZURE_AI_MODEL_DEPLOYMENT_NAME }}
          ACR_NAME: ${{ vars.ACR_NAME }}
        run: |
          set -euo pipefail
          IMAGE="${ACR_NAME}.azurecr.io/supplements-specialist:${GITHUB_SHA::8}"
          echo "Building $IMAGE for linux/amd64 (one image serves all roles)"
          az acr login --name "$ACR_NAME"
          docker buildx build --platform linux/amd64 -t "$IMAGE" --push agent
          echo "Updating the Foundry hosted specialist agents to the new image…"
          # One container image serves all three roles (SPECIALIST_ROLE selects which).
          # The compliance specialist is the self-improvement target, but the image
          # update applies to every role's deployment.
          for ROLE in inventory forecast compliance; do
            az foundry agent update \
              --project-endpoint "$FOUNDRY_PROJECT_ENDPOINT" \
              --name "${ROLE}-specialist" \
              --image "$IMAGE" || echo "::warning::Update ${ROLE}-specialist with your deployment tooling if this command is unavailable."
          done
