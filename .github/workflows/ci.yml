name: CI

# Build + typecheck + tests for the Copilot SDK app (API + web) and the agent.
# Keeps the demo repo credible and green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: src/api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --config.dangerouslyAllowAllBuilds=true
      - run: pnpm exec tsc --noEmit
      - run: pnpm test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: src/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --config.dangerouslyAllowAllBuilds=true
      - run: pnpm run build

  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax-check the agent
        run: python -m py_compile main.py
      - name: Validate eval dataset is well-formed JSONL
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("eval/compliance_golden.jsonl")
          n = 0
          for line in p.read_text().splitlines():
              if line.strip():
                  row = json.loads(line)
                  assert "query" in row and "expected_behavior" in row, row
                  n += 1
          print(f"OK: {n} eval rows")
          PY
