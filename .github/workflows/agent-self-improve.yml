name: Agent Self-Improvement

# The finale of the demo: "CI/CD for intelligence."
#
# When Foundry continuous evaluation flags a weak answer from the Tier-2
# specialist agent, it dispatches this workflow. The workflow runs the optimizer
# to produce better agent instructions and opens a pull request. A human reviews
# the diff and merges; merging triggers the redeploy workflow, and the agent
# comes back smarter.
#
# Triggers:
#   - workflow_dispatch: run it by hand (used while recording).
#   - repository_dispatch (type: eval-regression): fired by Foundry continuous
#     eval when a metric drops below threshold.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are we optimizing? (shown in the PR)"
        required: false
        default: "Continuous evaluation flagged a weak response on a billing-dispute case."
      eval_run_url:
        description: "Link to the failing Foundry evaluation run (optional)"
        required: false
        default: ""
  repository_dispatch:
    types: [eval-regression]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: agent-self-improve
  cancel-in-progress: false

jobs:
  optimize-and-open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve trigger context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "reason=${{ github.event.client_payload.reason }}" >> "$GITHUB_OUTPUT"
            echo "eval_run_url=${{ github.event.client_payload.eval_run_url }}" >> "$GITHUB_OUTPUT"
            echo "metric=${{ github.event.client_payload.metric }}" >> "$GITHUB_OUTPUT"
            echo "score=${{ github.event.client_payload.score }}" >> "$GITHUB_OUTPUT"
          else
            echo "reason=${{ github.event.inputs.reason }}" >> "$GITHUB_OUTPUT"
            echo "eval_run_url=${{ github.event.inputs.eval_run_url }}" >> "$GITHUB_OUTPUT"
            echo "metric=task_adherence" >> "$GITHUB_OUTPUT"
            echo "score=0.72" >> "$GITHUB_OUTPUT"
          fi

      # Optional: authenticate to Azure so the REAL Foundry optimizer can run.
      # Configure these repo secrets to enable OIDC login. Without them, the
      # script applies the reviewed curated improvement (deterministic).
      - name: Azure login (optional)
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Optimize agent instructions
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
        run: |
          python scripts/optimize_agent_instructions.py --mode auto

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: agent/self-improvement
          commit-message: "agent: improve Tier-2 specialist instructions from eval feedback"
          title: "🤖 Improve Tier-2 specialist instructions (eval-driven)"
          body: |
            ## Why

            ${{ steps.ctx.outputs.reason }}

            Foundry continuous evaluation flagged a regression on
            **`${{ steps.ctx.outputs.metric }}`** (score **${{ steps.ctx.outputs.score }}**)
            for the Tier-2 billing-dispute specialist agent.

            ${{ steps.ctx.outputs.eval_run_url != '' && format('[View the failing evaluation run]({0})', steps.ctx.outputs.eval_run_url) || '' }}

            ## What changed

            The optimizer updated [`agent/instructions/compliance.md`](agent/instructions/compliance.md) to
            close the gap — adding explicit handling for unsubstantiated fraud
            claims, reversed/declined items, and ambiguous cases, plus crisper
            customer-facing messaging.

            ## What happens on merge

            Merging this PR triggers **Agent Redeploy**, which rebuilds the agent
            container, pushes it to ACR, and updates the Foundry hosted agent. The
            same evaluation then re-runs to confirm the score recovers.

            > CI/CD for intelligence: production signal → optimization → review →
            > redeploy. The agent improves itself, with a human in the loop.
          labels: |
            agent
            self-improvement
            ai-tour-demo
